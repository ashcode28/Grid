<!DOCTYPE html>
<html>
<head>
<style>
.container{
  display:grid;
  grid-template-columns:repeat(6,70px);
  gap:10px;
}

.box{
  width:70px;
  height:70px;
}

.c1{background:orange;}
.c2{background:peachpuff;}
.c3{background:brown;}
</style>
</head>
<body>

<div class="container">
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>

  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>

  <div class="box c3"></div><div class="box c1"></div><div class="box c2"></div>
  <div class="box c3"></div><div class="box c1"></div><div class="box c2"></div>

  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>

  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
</div>

</body>
</html>
